---
- name: Install sway packages (dnf)
  become: true
  ansible.builtin.dnf:
    name: "{{ sway_packages }}"
    state: present
  when: pkg_manager == "dnf"

- name: Install sway packages (pacman)
  become: true
  community.general.pacman:
    name: "{{ sway_packages }}"
    state: present
  when: pkg_manager == "pacman"

- name: Create sway config directory
  ansible.builtin.file:
    path: "{{ home_dir }}/.config/sway"
    state: directory
    mode: "0755"

- name: Stow sway dotfiles
  ansible.builtin.shell: stow -d "{{ stow_dir }}" -t "{{ home_dir }}" sway
  args:
    chdir: "{{ stow_dir }}"
