---
- name: Setup repos (Fedora)
  when: pkg_manager == "dnf"
  block:
    - name: Add VS Code repo
      become: true
      ansible.builtin.yum_repository:
        name: code
        description: Visual Studio Code
        baseurl: https://packages.microsoft.com/yumrepos/vscode
        enabled: true
        gpgcheck: true
        gpgkey: https://packages.microsoft.com/keys/microsoft.asc

    - name: Add negativo17 Spotify repo
      become: true
      ansible.builtin.yum_repository:
        name: fedora-spotify
        description: negativo17 - Spotify
        baseurl: "https://negativo17.org/repos/spotify/fedora-$releasever/$basearch/"
        enabled: true
        skip_if_unavailable: true
        gpgcheck: true
        gpgkey: https://negativo17.org/repos/RPM-GPG-KEY-slaanesh
        metadata_expire: 6h

    - name: Install RPM Fusion free
      become: true
      ansible.builtin.dnf:
        name: "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_distribution_major_version }}.noarch.rpm"
        state: present
        disable_gpg_check: true

    - name: Install RPM Fusion nonfree
      become: true
      ansible.builtin.dnf:
        name: "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_major_version }}.noarch.rpm"
        state: present
        disable_gpg_check: true
